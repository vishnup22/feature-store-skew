name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  train-serve-parity:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FEAST_REDIS_CONNECTION_STRING: localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NYC taxi dataset
        run: python pipeline/download_raw_data.py

      - name: Run PySpark feature engineering
        run: python pipeline/spark_features.py

      - name: Apply Feast definitions
        working-directory: feature_store/feature_repo
        run: feast apply

      - name: Materialize features to Redis
        run: python feature_store/materialize.py

      - name: Train model and log feature metadata
        run: python training/train.py

      - name: Run train-serve parity tests
        run: pytest tests/test_skew.py -v

      - name: Verify FastAPI startup and health check
        run: |
          uvicorn serving.api:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          sleep 5
          curl --fail http://127.0.0.1:8000/health
          kill "${APP_PID}"

      - name: Build Docker image
        run: docker compose build api
